<svg width="260" height="180" viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="radarBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1f14"/>
      <stop offset="100%" stop-color="#060d08"/>
    </radialGradient>
    <style>
      .ring { fill: none; stroke: #1f5c37; stroke-width: 1.5; }
      .sweep {
        transform-origin: 130px 90px;
        animation: spin 3s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .blip {
        fill: #39ff88;
        animation: pulse 2s ease-in-out infinite;
      }
      .blip2 { animation-delay: 0.7s; }
      .blip3 { animation-delay: 1.4s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; r: 2.5; }
        50% { opacity: 1; r: 4.5; }
      }
      .label { font-family: 'Courier New', monospace; font-size: 11px; fill: #4c8c66; }
    </style>
  </defs>

  <rect width="260" height="180" rx="12" fill="url(#radarBg)"/>
  <rect width="260" height="180" rx="12" fill="none" stroke="#1f3d2a" stroke-width="2"/>

  <circle class="ring" cx="130" cy="90" r="55"/>
  <circle class="ring" cx="130" cy="90" r="38"/>
  <circle class="ring" cx="130" cy="90" r="20"/>
  <line class="ring" x1="75" y1="90" x2="185" y2="90"/>
  <line class="ring" x1="130" y1="35" x2="130" y2="145"/>

  <g class="sweep">
    <path d="M130,90 L130,35 A55,55 0 0,1 173,64 Z" fill="#39ff88" opacity="0.25"/>
  </g>

  <circle class="blip" cx="150" cy="70" r="3"/>
  <circle class="blip blip2" cx="105" cy="105" r="3"/>
  <circle class="blip blip3" cx="160" cy="115" r="3"/>

  <text x="130" y="168" text-anchor="middle" class="label">scanning for threats...</text>
</svg>
