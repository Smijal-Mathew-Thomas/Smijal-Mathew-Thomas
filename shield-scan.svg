<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1620"/>
      <stop offset="100%" stop-color="#0d1f2b"/>
    </linearGradient>
    <style>
      .shield { fill: none; stroke: #00e5ff; stroke-width: 3; }
      .fill-sweep {
        fill: #00e5ff;
        opacity: 0.18;
        animation: rise 3s ease-in-out infinite;
        transform-origin: 150px 110px;
      }
      @keyframes rise {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      .check {
        stroke: #39ff88;
        stroke-width: 4;
        fill: none;
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: draw 1.2s ease-out 0.6s forwards infinite alternate;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
      .label { font-family: 'Courier New', monospace; font-size: 12px; fill: #6fb7c9; }
      .blink-dot {
        fill: #39ff88;
        animation: blinkdot 1.6s ease-in-out infinite;
      }
      @keyframes blinkdot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.25; }
      }
    </style>
  </defs>

  <rect width="300" height="150" rx="12" fill="url(#bgGrad)"/>
  <rect width="300" height="150" rx="12" fill="none" stroke="#123244" stroke-width="2"/>

  <path class="shield" d="M150 25 L195 42 V78 C195 108 175 128 150 138 C125 128 105 108 105 78 V42 Z"/>
  <clipPath id="shieldClip">
    <path d="M150 25 L195 42 V78 C195 108 175 128 150 138 C125 128 105 108 105 78 V42 Z"/>
  </clipPath>
  <rect class="fill-sweep" x="105" y="60" width="90" height="80" clip-path="url(#shieldClip)"/>

  <path class="check" d="M130 78 L145 93 L172 60"/>

  <circle class="blink-dot" cx="30" cy="20" r="4"/>
  <text x="42" y="24" class="label">status: secure</text>
</svg>
